name: Feature Request
description: Suggest an idea or improvement for Laranova
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like to see added and why it would be useful.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Laranova does this relate to?
      options:
        - Route Scanner
        - Request Builder
        - Faker Tag Engine
        - Pre-scripts API
        - Response Panel
        - History
        - Export (cURL / Postman)
        - UI / UX
        - Configuration
        - Documentation
        - New Feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem or pain point does this solve? What is missing?
      placeholder: "It's frustrating that I can't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like, in as much detail as possible.
      placeholder: |
        I would like a button that...
        It should work like Postman's X feature where...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?
      placeholder: I currently work around this by...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
